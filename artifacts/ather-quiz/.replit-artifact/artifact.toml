kind = "web"
previewPath = "/"
title = "ATHER Quiz"
version = "1.0.0"
id = "artifacts/ather-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19272

[services.development]
run = "pnpm --filter @workspace/ather-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ather-quiz", "run", "build" ]
publicDir = "artifacts/ather-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19272"
BASE_PATH = "/"
